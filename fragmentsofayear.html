<style>
body {

.hidden { display: none; }

/* CALENDAR */
.calendar {
   width: 100%;
  height: 100vh;
  overflow-y: scroll;
  padding: 30px;
  font-family: 'Quicksand', sans-serif;
}

.month { margin-bottom: 60px; }

.month h2 {
  font-family: 'Quicksand', sans-serif;
  font-size: 30px;
  color: #ff69b4;
}

.day-labels {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  margin-bottom: 10px;
  text-align: center;
  color: #545454;
  font-weight: 600;
}

.dates-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  justify-content: center;
  gap: 8px;
}

.date {
  aspect-ratio: 1/1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #545454;
  border-radius: 12px;
  cursor: pointer;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  transition: 0.2s;
}

.date:hover { background: #ffccdd; }

.disabled {
  background: #e0e0e0;
  color: #999;
  cursor: not-allowed;
  pointer-events: none;
}

/* DETAIL */
.detail {
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  font-family: 'Quicksand', sans-serif;
}

.box {
  max-width: 500px;
  width: 90%;
  max-height: 70vh;
  overflow-y: auto;
}

.box h1 {
  white-space: pre-line;
}
 
.arrow {

  font-size: 40px;
  font-family: 'Quicksand', serif;
  font-weight: bold;
  color: #545454;
  font-weight: bold;
  cursor: pointer;
}
.arrow.left { left: 30px; top: 50%; }
.arrow.right { right: 30px; top: 50%; }

.back {
  position: absolute;
  top: 20px;
  left: 20px;
  cursor: pointer;
}
  
.first {

  font-size: 20px;
  color: #ff69b4;
}
.second {

function getMessage(date) {
  const key = date.toISOString().split('T')[0];
  return messages[key] || "..."; 
}

function createCalendar(start, end) {
  let date = new Date(start);

  while (date <= end) {
    const monthDiv = document.createElement("div");
    monthDiv.className = "month";

    const currentMonth = date.getMonth();
    const currentYear = date.getFullYear();

    const monthTitle = document.createElement("h2");
    monthTitle.innerText = date.toLocaleString('default', { month: 'long', year: 'numeric' });
    monthDiv.appendChild(monthTitle);

    // DAY LABELS
    const labels = document.createElement("div");
    labels.className = "day-labels";
    ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(day => {
      const el = document.createElement("div");
      el.innerText = day;
      labels.appendChild(el);
    });
    monthDiv.appendChild(labels);

    // GRID
    const grid = document.createElement("div");
    grid.className = "dates-grid";

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();

    for (let i = 0; i < firstDay; i++) {
      grid.appendChild(document.createElement("div"));
    }

    while (date.getMonth() === currentMonth && date.getFullYear() === currentYear && date <= end) {
      const d = document.createElement("div");
      d.className = "date";
      d.innerText = date.getDate();

      const fullDate = new Date(date);

      if (fullDate < startDate || fullDate > endDate) {
        d.classList.add("disabled");
      } else {
        d.onclick = () => {
          currentDate = new Date(fullDate);
          showDetail();
          updateText();
        };
      }

      grid.appendChild(d);
      date.setDate(date.getDate() + 1);
    }

    monthDiv.appendChild(grid);
    calendar.appendChild(monthDiv);
  }
}

function showDetail() {
  calendarSection.classList.add("hidden");
  detailSection.classList.remove("hidden");
}

function goBack() {
  detailSection.classList.add("hidden");
  calendarSection.classList.remove("hidden");
}

function updateText() {
  if (!currentDate) return;
  text.innerHTML = getMessage(currentDate);
  updateArrows();
}

function nextDate() {
  if (!currentDate) return;
  let next = new Date(currentDate);
  next.setDate(next.getDate() + 1);
  if (next <= endDate) {
    currentDate = next;
    updateText();
  }
}

function prevDate() {
  if (!currentDate) return;
  let prev = new Date(currentDate);
  prev.setDate(prev.getDate() - 1);
  if (prev >= startDate) {
    currentDate = prev;
    updateText();
  }
}

function updateArrows() {
  const leftArrow = document.querySelector(".arrow.left");
  const rightArrow = document.querySelector(".arrow.right");

  let prev = new Date(currentDate);
  prev.setDate(prev.getDate() - 1);

  let next = new Date(currentDate);
  next.setDate(next.getDate() + 1);

  leftArrow.style.display = (prev < startDate) ? "none" : "block";
  rightArrow.style.display = (next > endDate) ? "none" : "block";
}

createCalendar(new Date(2025, 3, 1), new Date(2026, 3, 30));
